<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doğrudan Temin Modülü</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===== GİRİŞ EKRANI ===== -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-box">
      <div class="login-logo">
        <h1>DTM</h1>
        <p>Doğrudan Temin Modülü</p>
        <span class="login-version">v1.0.0</span>
      </div>
      <div id="loginError" class="login-error" style="display:none"></div>
      <div class="form-group">
        <label>Kullanıcı Adı</label>
        <input type="text" id="loginUsername" placeholder="kullaniciadi" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Şifre</label>
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn btn-primary" style="width:100%;margin-top:8px" id="loginBtn" onclick="doLogin()">
        Giriş Yap
      </button>
    </div>
  </div>

  <!-- ===== ANA UYGULAMA ===== -->
  <div class="app-layout" id="appLayout" style="display:none">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>DTM</h1>
        <p>Doğrudan Temin Modülü</p>
        <p style="font-size:10px;opacity:0.6;margin-top:2px;">v1.0.0</p>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">Veri Girişi</div>
        <div class="nav-item active" data-page="veri-giris">
          <span class="nav-icon">&#9997;</span> Veri Giriş Formu
        </div>
        <div class="nav-section">Belgeler</div>
        <div class="nav-item" data-page="belgeler">
          <span class="nav-icon">&#128196;</span> Belge Önizleme / Yazdır
        </div>
        <div class="nav-section">Yönetim</div>
        <div class="nav-item" data-page="veri-merkezi">
          <span class="nav-icon">&#9881;</span> Veri Merkezi
        </div>
        <div class="nav-item" data-page="dashboard">
          <span class="nav-icon">&#128202;</span> Dashboard
        </div>
        <!-- Admin only -->
        <div class="nav-item admin-only" data-page="kullanici-yonetimi" style="display:none">
          <span class="nav-icon">&#128100;</span> Kullanıcı Yönetimi
        </div>
        <div class="nav-section">İşlemler</div>
        <div class="nav-item" data-page="kaydet-yukle">
          <span class="nav-icon">&#128190;</span> Kaydet / Yükle
        </div>
      </nav>

      <!-- Kullanıcı bilgisi + çıkış -->
      <div class="sidebar-user">
        <div class="sidebar-user-info">
          <span class="sidebar-user-avatar">&#128100;</span>
          <div>
            <div class="sidebar-user-name" id="sidebarUserName">-</div>
            <div class="sidebar-user-role" id="sidebarUserRole">-</div>
          </div>
        </div>
        <button class="btn-logout" onclick="doLogout()" title="Çıkış Yap">&#10148;</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
      <!-- Pages rendered by app.js -->
    </main>
  </div>

  <!-- Firebase CDN -->
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

  <!-- App scripts -->
  <script src="js/firebase.js?v=20260319"></script>
  <script src="js/utils.js?v=20260319"></script>
  <script src="js/data.js?v=20260319"></script>
  <script src="js/calculations.js?v=20260319"></script>
  <script src="js/documents.js?v=20260319"></script>
  <script src="js/app.js?v=20260319"></script>
</body>
</html>
