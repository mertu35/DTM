<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Erkek Mühendis 2 - Turuncu arka plan, gri/beyaz baret -->
  <circle cx="50" cy="50" r="50" fill="#c2410c"/>
  <!-- Gövde -->
  <ellipse cx="50" cy="94" rx="33" ry="24" fill="#7c2d12"/>
  <!-- Yaka -->
  <polygon points="50,63 44,75 56,75" fill="#fed7aa"/>
  <!-- Boyun -->
  <rect x="46" y="55" width="8" height="12" rx="2" fill="#fcd9b0"/>
  <!-- Yüz -->
  <circle cx="50" cy="41" r="16" fill="#fcd9b0"/>
  <!-- Kısa saç - açık kahve -->
  <path d="M34,41 C34,24 66,24 66,41 C63,32 56,26 50,26 C44,26 37,32 34,41Z" fill="#5c3317"/>
  <!-- Gri/beyaz baret gövdesi -->
  <ellipse cx="50" cy="30" rx="19" ry="11" fill="#e5e7eb"/>
  <!-- Baret saçağı -->
  <ellipse cx="50" cy="36" rx="23" ry="5" fill="#d1d5db"/>
  <!-- Baret şerit -->
  <rect x="31" y="33" width="38" height="3" rx="1.5" fill="#9ca3af"/>
  <!-- Baret parlaklık -->
  <ellipse cx="44" cy="25" rx="6" ry="3" fill="#f9fafb" opacity="0.6"/>
  <!-- Gözler -->
  <circle cx="44" cy="40" r="2.2" fill="#1a0a00"/>
  <circle cx="56" cy="40" r="2.2" fill="#1a0a00"/>
  <circle cx="44.8" cy="39.3" r="0.7" fill="#fff"/>
  <circle cx="56.8" cy="39.3" r="0.7" fill="#fff"/>
  <!-- Kaşlar -->
  <path d="M40,36 Q44,34 48,36" stroke="#3d2b1f" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M52,36 Q56,34 60,36" stroke="#3d2b1f" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Ağız -->
  <path d="M44,49 Q50,54 56,49" stroke="#b07050" stroke-width="1.8" fill="none" stroke-linecap="round"/>
</svg>
