<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Arka plan -->
  <circle cx="50" cy="50" r="50" fill="#7c3aed"/>

  <!-- Uzun saç (omuzlara inen, arkada) -->
  <ellipse cx="35" cy="62" rx="10" ry="22" fill="#3b2013"/>
  <ellipse cx="65" cy="62" rx="10" ry="22" fill="#3b2013"/>

  <!-- Gövde / iş gömleği -->
  <ellipse cx="50" cy="98" rx="38" ry="28" fill="#4c1d95"/>
  <!-- Gömlek düğme çizgisi -->
  <line x1="50" y1="70" x2="50" y2="98" stroke="#5b21b6" stroke-width="1.2"/>
  <!-- Yaka sol -->
  <polygon points="42,65 50,72 38,78" fill="#7c3aed"/>
  <!-- Yaka sağ -->
  <polygon points="58,65 50,72 62,78" fill="#6d28d9"/>

  <!-- Boyun -->
  <path d="M44,57 L44,65 Q50,68 56,65 L56,57" fill="#e8b888"/>

  <!-- Yüz -->
  <ellipse cx="50" cy="42" rx="16" ry="18.5" fill="#f0c8a0"/>
  <!-- Yüz gölge (çene) -->
  <ellipse cx="50" cy="52" rx="11" ry="5.5" fill="#e8b888" opacity="0.5"/>

  <!-- Kulaklar -->
  <ellipse cx="34" cy="43" rx="3" ry="4.5" fill="#e8b888"/>
  <ellipse cx="34" cy="43" rx="1.8" ry="2.8" fill="#d4a574" opacity="0.4"/>
  <ellipse cx="66" cy="43" rx="3" ry="4.5" fill="#e8b888"/>
  <ellipse cx="66" cy="43" rx="1.8" ry="2.8" fill="#d4a574" opacity="0.4"/>
  <!-- Küpeler -->
  <circle cx="33.5" cy="48" r="1.8" fill="#fbbf24"/>
  <circle cx="66.5" cy="48" r="1.8" fill="#fbbf24"/>

  <!-- Saç üst (koyu kahve, uzun) -->
  <path d="M34,43 C34,22 66,22 66,43 C66,34 60,25 50,25 C40,25 34,34 34,43Z" fill="#3b2013"/>
  <!-- Saç kakül -->
  <path d="M36,36 Q40,30 45,32 Q42,28 50,27 Q46,30 48,33" fill="#4a2a15" opacity="0.6"/>
  <!-- Saç yan -->
  <path d="M34,38 C33,44 33,50 35,58" stroke="#3b2013" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M66,38 C67,44 67,50 65,58" stroke="#3b2013" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Baret gövdesi -->
  <path d="M28,36 Q29,18 50,16 Q71,18 72,36 Z" fill="#f59e0b"/>
  <!-- Baret alt kenar -->
  <ellipse cx="50" cy="36" rx="24" ry="5" fill="#d97706"/>
  <!-- Baret üst yuvarlak -->
  <ellipse cx="50" cy="22" rx="13" ry="5.5" fill="#fbbf24"/>
  <!-- Baret parlama -->
  <ellipse cx="42" cy="23" rx="6.5" ry="3.5" fill="#fde68a" opacity="0.45"/>
  <!-- Baret orta çıkıntı -->
  <rect x="48" y="14" width="4" height="5" rx="2" fill="#d97706"/>

  <!-- Kaşlar (ince, kadın) -->
  <path d="M39,37.5 Q42,35.5 46,37" stroke="#2a1a0a" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <path d="M54,37 Q58,35.5 61,37.5" stroke="#2a1a0a" stroke-width="1.3" fill="none" stroke-linecap="round"/>

  <!-- Gözler -->
  <ellipse cx="43" cy="41" rx="3" ry="3.2" fill="#fff"/>
  <ellipse cx="57" cy="41" rx="3" ry="3.2" fill="#fff"/>
  <!-- Kirpikler -->
  <path d="M40,38.5 Q41,37.5 42,38" stroke="#2a1a0a" stroke-width="0.8" fill="none"/>
  <path d="M44,38 Q45,37 46,38" stroke="#2a1a0a" stroke-width="0.8" fill="none"/>
  <path d="M54,38 Q55,37 56,38" stroke="#2a1a0a" stroke-width="0.8" fill="none"/>
  <path d="M58,38 Q59,37.5 60,38.5" stroke="#2a1a0a" stroke-width="0.8" fill="none"/>
  <!-- İris -->
  <circle cx="43.5" cy="41.2" r="2" fill="#3b2013"/>
  <circle cx="57.5" cy="41.2" r="2" fill="#3b2013"/>
  <!-- Göz bebeği -->
  <circle cx="43.5" cy="41.2" r="1" fill="#0f0a05"/>
  <circle cx="57.5" cy="41.2" r="1" fill="#0f0a05"/>
  <!-- Göz parlaması -->
  <circle cx="44.3" cy="40.3" r="0.7" fill="#fff"/>
  <circle cx="58.3" cy="40.3" r="0.7" fill="#fff"/>

  <!-- Burun -->
  <path d="M48,44 Q50,48 52,44" stroke="#c89468" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Ağız (gülümseyen) -->
  <path d="M43.5,50.5 Q50,55 56.5,50.5" stroke="#b06050" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <!-- Alt dudak dolgu -->
  <path d="M44.5,51 Q50,54.5 55.5,51" fill="#c47a60" opacity="0.3"/>
  <!-- Üst dudak -->
  <path d="M45,50.5 Q50,49 55,50.5" stroke="#b06850" stroke-width="0.7" fill="none"/>
</svg>
