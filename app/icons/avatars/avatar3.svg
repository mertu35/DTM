<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Arka plan -->
  <circle cx="50" cy="50" r="50" fill="#0891b2"/>

  <!-- Gövde / açık mavi gömlek -->
  <ellipse cx="50" cy="98" rx="38" ry="28" fill="#bae6fd"/>
  <!-- Gömlek düğme çizgisi -->
  <line x1="50" y1="70" x2="50" y2="98" stroke="#7dd3fc" stroke-width="1"/>
  <!-- Düğmeler -->
  <circle cx="50" cy="76" r="1.2" fill="#7dd3fc"/>
  <circle cx="50" cy="82" r="1.2" fill="#7dd3fc"/>
  <circle cx="50" cy="88" r="1.2" fill="#7dd3fc"/>
  <!-- Yaka sol -->
  <polygon points="43,64 50,72 37,77" fill="#e0f2fe"/>
  <!-- Yaka sağ -->
  <polygon points="57,64 50,72 63,77" fill="#e0f2fe"/>

  <!-- Boyun -->
  <path d="M44,57 L44,64 Q50,67 56,64 L56,57" fill="#e8b888"/>

  <!-- Yüz -->
  <ellipse cx="50" cy="42" rx="17" ry="19" fill="#f0c8a0"/>
  <!-- Yüz gölge -->
  <ellipse cx="50" cy="52" rx="12" ry="6" fill="#e8b888" opacity="0.5"/>

  <!-- Kulaklar -->
  <ellipse cx="33" cy="43" rx="3.5" ry="5" fill="#e8b888"/>
  <ellipse cx="33" cy="43" rx="2" ry="3" fill="#d4a574" opacity="0.4"/>
  <ellipse cx="67" cy="43" rx="3.5" ry="5" fill="#e8b888"/>
  <ellipse cx="67" cy="43" rx="2" ry="3" fill="#d4a574" opacity="0.4"/>

  <!-- Saç (kısa, koyu, düzgün) -->
  <path d="M33,42 C33,21 67,21 67,42 C67,33 60,25 50,25 C40,25 33,33 33,42Z" fill="#1a1a2e"/>
  <!-- Saç yan -->
  <path d="M33,38 C33,36 34,33 36,31" stroke="#1a1a2e" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M67,38 C67,36 66,33 64,31" stroke="#1a1a2e" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Saç ayrımı -->
  <path d="M42,26 Q44,30 43,35" stroke="#111122" stroke-width="1" fill="none" opacity="0.4"/>

  <!-- Kaşlar -->
  <path d="M39,37 Q42,34.5 46,36.5" stroke="#1a1a2e" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M54,36.5 Q58,34.5 61,37" stroke="#1a1a2e" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Gözler -->
  <ellipse cx="43" cy="41" rx="3" ry="3.2" fill="#fff"/>
  <ellipse cx="57" cy="41" rx="3" ry="3.2" fill="#fff"/>
  <!-- İris -->
  <circle cx="43.5" cy="41.2" r="2" fill="#1a1a2e"/>
  <circle cx="57.5" cy="41.2" r="2" fill="#1a1a2e"/>
  <!-- Göz bebeği -->
  <circle cx="43.5" cy="41.2" r="1" fill="#0a0a15"/>
  <circle cx="57.5" cy="41.2" r="1" fill="#0a0a15"/>
  <!-- Göz parlaması -->
  <circle cx="44.3" cy="40.3" r="0.7" fill="#fff"/>
  <circle cx="58.3" cy="40.3" r="0.7" fill="#fff"/>

  <!-- Burun -->
  <path d="M48,44 Q50,48.5 52,44" stroke="#c89468" stroke-width="1.3" fill="none" stroke-linecap="round"/>

  <!-- Ağız (hafif gülümseme) -->
  <path d="M44,50.5 Q50,54.5 56,50.5" stroke="#a0604a" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <path d="M45,51 Q50,54 55,51" fill="#c47a60" opacity="0.3"/>
  <path d="M45.5,50.5 Q50,49 54.5,50.5" stroke="#b06850" stroke-width="0.7" fill="none"/>
</svg>
