  <!-- Saç yan -->
  <path d="M33,38 C33,36 34,33 36,31" stroke="#2d1b0e" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M67,38 C67,36 66,33 64,31" stroke="#2d1b0e" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Kaşlar -->
  <path d="M39,37 Q42,34.5 46,36.5" stroke="#2d1b0e" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M54,36.5 Q58,34.5 61,37" stroke="#2d1b0e" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Gözler -->
  <ellipse cx="43" cy="41" rx="3" ry="3.2" fill="#fff"/>
  <ellipse cx="57" cy="41" rx="3" ry="3.2" fill="#fff"/>
  <!-- İris -->
  <circle cx="43.5" cy="41.2" r="2" fill="#2d1b0e"/>
  <circle cx="57.5" cy="41.2" r="2" fill="#2d1b0e"/>
  <!-- Göz bebeği -->
  <circle cx="43.5" cy="41.2" r="1" fill="#0f0a05"/>
  <circle cx="57.5" cy="41.2" r="1" fill="#0f0a05"/>
  <!-- Göz parlaması -->
  <circle cx="44.3" cy="40.3" r="0.7" fill="#fff"/>
  <circle cx="58.3" cy="40.3" r="0.7" fill="#fff"/>

  <!-- Burun -->
  <path d="M48,44 Q50,48.5 52,44" stroke="#c89468" stroke-width="1.3" fill="none" stroke-linecap="round"/>

  <!-- Ağız -->
  <path d="M44,50.5 Q50,54.5 56,50.5" stroke="#a0604a" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <path d="M45,51 Q50,54 55,51" fill="#c47a60" opacity="0.3"/>
  <path d="M45.5,50.5 Q50,49 54.5,50.5" stroke="#b06850" stroke-width="0.7" fill="none"/>

  <!-- Gülümseme çukurları -->
