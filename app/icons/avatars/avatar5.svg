  <ellipse cx="50" cy="67" rx="3" ry="2" fill="#b91c1c"/>

  <!-- Boyun -->
  <path d="M44,57 L44,64 Q50,67 56,64 L56,57" fill="#e8b888"/>

  <!-- Yüz -->
  <ellipse cx="50" cy="42" rx="17" ry="19" fill="#f0c8a0"/>
