<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Kadın Memur - Kırmızı arka plan, bluz, uzun koyu saç -->
  <circle cx="50" cy="50" r="50" fill="#b91c1c"/>
  <!-- Uzun saç (arkada, omuzlara inen) -->
  <ellipse cx="34" cy="62" rx="9" ry="22" fill="#3d2b1f"/>
  <ellipse cx="66" cy="62" rx="9" ry="22" fill="#3d2b1f"/>
  <!-- Gövde/bluz -->
  <ellipse cx="50" cy="95" rx="33" ry="24" fill="#991b1b"/>
  <!-- Bluz yaka -->
  <polygon points="50,63 44,77 56,77" fill="#fecaca"/>
  <!-- Boyun -->
  <rect x="46" y="55" width="8" height="10" rx="2" fill="#fcd9b0"/>
  <!-- Yüz -->
  <circle cx="50" cy="41" r="16" fill="#fcd9b0"/>
  <!-- Saç üst -->
  <path d="M34,41 C34,24 66,24 66,41 C63,32 56,26 50,26 C44,26 37,32 34,41Z" fill="#3d2b1f"/>
  <!-- Küpeler -->
  <circle cx="34.5" cy="44" r="2" fill="#fca5a5"/>
  <circle cx="65.5" cy="44" r="2" fill="#fca5a5"/>
  <!-- Gözler -->
  <circle cx="44" cy="40" r="2.2" fill="#1a0a00"/>
  <circle cx="56" cy="40" r="2.2" fill="#1a0a00"/>
  <circle cx="44.8" cy="39.3" r="0.7" fill="#fff"/>
  <circle cx="56.8" cy="39.3" r="0.7" fill="#fff"/>
  <!-- İnce kaşlar -->
  <path d="M41,36 Q44,34.5 47,36" stroke="#2d1b0e" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <path d="M53,36 Q56,34.5 59,36" stroke="#2d1b0e" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <!-- Ağız -->
  <path d="M45,49 Q50,54 55,49" stroke="#b07050" stroke-width="1.6" fill="none" stroke-linecap="round"/>
</svg>
