<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Erkek Mühendis - Mavi arka plan, sarı baret -->
  <circle cx="50" cy="50" r="50" fill="#1d4ed8"/>
  <!-- Gövde/gömlek -->
  <ellipse cx="50" cy="94" rx="33" ry="24" fill="#1e3a5f"/>
  <!-- Gömlek yaka -->
  <polygon points="50,63 44,75 56,75" fill="#bfdbfe"/>
  <!-- Boyun -->
  <rect x="46" y="55" width="8" height="12" rx="2" fill="#fcd9b0"/>
  <!-- Yüz -->
  <circle cx="50" cy="41" r="16" fill="#fcd9b0"/>
  <!-- Kısa erkek saçı -->
  <path d="M34,41 C34,24 66,24 66,41 C63,32 56,26 50,26 C44,26 37,32 34,41Z" fill="#2d1b0e"/>
  <!-- Baret gövdesi -->
  <ellipse cx="50" cy="30" rx="19" ry="11" fill="#f59e0b"/>
  <!-- Baret saçağı -->
  <ellipse cx="50" cy="36" rx="23" ry="5" fill="#d97706"/>
  <!-- Baret parlaklık -->
  <ellipse cx="44" cy="25" rx="6" ry="3" fill="#fde68a" opacity="0.5"/>
  <!-- Gözler -->
  <circle cx="44" cy="40" r="2.2" fill="#1a0a00"/>
  <circle cx="56" cy="40" r="2.2" fill="#1a0a00"/>
  <circle cx="44.8" cy="39.3" r="0.7" fill="#fff"/>
  <circle cx="56.8" cy="39.3" r="0.7" fill="#fff"/>
  <!-- Kaşlar - kalın erkek -->
  <path d="M40,36 Q44,34 48,36" stroke="#2d1b0e" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M52,36 Q56,34 60,36" stroke="#2d1b0e" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Ağız -->
  <path d="M44,49 Q50,53 56,49" stroke="#b07050" stroke-width="1.8" fill="none" stroke-linecap="round"/>
</svg>
