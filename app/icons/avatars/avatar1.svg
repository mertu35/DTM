<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Arka plan -->
  <circle cx="50" cy="50" r="50" fill="#2563eb"/>

  <!-- Gövde / iş gömleği -->
  <ellipse cx="50" cy="98" rx="38" ry="28" fill="#1e3a8a"/>
  <!-- Gömlek düğme çizgisi -->
  <line x1="50" y1="70" x2="50" y2="98" stroke="#1e40af" stroke-width="1.2"/>
  <!-- Yaka sol -->
  <polygon points="42,65 50,72 38,78" fill="#3b82f6"/>
  <!-- Yaka sağ -->
  <polygon points="58,65 50,72 62,78" fill="#2563eb"/>
  <!-- Cep (sol) -->
  <rect x="35" y="80" width="10" height="7" rx="1.5" fill="#1e40af" opacity="0.5"/>

  <!-- Boyun -->
  <path d="M44,57 L44,65 Q50,68 56,65 L56,57" fill="#e8b888"/>

  <!-- Yüz -->
  <ellipse cx="50" cy="42" rx="17" ry="19" fill="#f0c8a0"/>
  <!-- Yüz gölge (çene) -->
  <ellipse cx="50" cy="52" rx="12" ry="6" fill="#e8b888" opacity="0.5"/>

  <!-- Kulaklar -->
  <ellipse cx="33" cy="43" rx="3.5" ry="5" fill="#e8b888"/>
  <ellipse cx="33" cy="43" rx="2" ry="3" fill="#d4a574" opacity="0.4"/>
  <ellipse cx="67" cy="43" rx="3.5" ry="5" fill="#e8b888"/>
  <ellipse cx="67" cy="43" rx="2" ry="3" fill="#d4a574" opacity="0.4"/>

  <!-- Saç (kısa, koyu kahve) -->
  <path d="M33,42 C33,22 67,22 67,42 C67,34 61,26 50,26 C39,26 33,34 33,42Z" fill="#3b2013"/>
  <!-- Saç yan (kulak üstü) -->
  <path d="M33,38 C33,36 34,33 36,32" stroke="#3b2013" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M67,38 C67,36 66,33 64,32" stroke="#3b2013" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Baret gövdesi -->
  <path d="M27,36 Q28,18 50,16 Q72,18 73,36 Z" fill="#f59e0b"/>
  <!-- Baret alt kenar (brim) -->
  <ellipse cx="50" cy="36" rx="25" ry="5" fill="#d97706"/>
  <!-- Baret üst yuvarlak -->
  <ellipse cx="50" cy="22" rx="14" ry="6" fill="#fbbf24"/>
  <!-- Baret parlama -->
  <ellipse cx="42" cy="23" rx="7" ry="4" fill="#fde68a" opacity="0.45"/>
  <!-- Baret orta çıkıntı -->
  <rect x="48" y="14" width="4" height="5" rx="2" fill="#d97706"/>

  <!-- Kaşlar -->
  <path d="M39,37 Q42,34.5 46,36.5" stroke="#2a1a0a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M54,36.5 Q58,34.5 61,37" stroke="#2a1a0a" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Gözler -->
  <ellipse cx="43" cy="41" rx="3" ry="3.2" fill="#fff"/>
  <ellipse cx="57" cy="41" rx="3" ry="3.2" fill="#fff"/>
  <!-- İris -->
  <circle cx="43.5" cy="41.2" r="2" fill="#3b2013"/>
  <circle cx="57.5" cy="41.2" r="2" fill="#3b2013"/>
  <!-- Göz bebeği -->
  <circle cx="43.5" cy="41.2" r="1" fill="#0f0a05"/>
  <circle cx="57.5" cy="41.2" r="1" fill="#0f0a05"/>
  <!-- Göz parlaması -->
  <circle cx="44.3" cy="40.3" r="0.7" fill="#fff"/>
  <circle cx="58.3" cy="40.3" r="0.7" fill="#fff"/>

  <!-- Burun -->
  <path d="M48,44 Q50,48.5 52,44" stroke="#c89468" stroke-width="1.3" fill="none" stroke-linecap="round"/>

  <!-- Ağız (gülümseyen) -->
  <path d="M43,51 Q50,56 57,51" stroke="#a0604a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Alt dudak dolgu -->
  <path d="M44,51.5 Q50,55.5 56,51.5" fill="#c47a60" opacity="0.35"/>
  <!-- Üst dudak çizgisi -->
  <path d="M45,51 Q50,49.5 55,51" stroke="#b06850" stroke-width="0.8" fill="none"/>

  <!-- Gülümseme çukurları -->
  <path d="M41,49 Q42,51 42.5,50" stroke="#c89468" stroke-width="0.7" fill="none" opacity="0.5"/>
  <path d="M59,49 Q58,51 57.5,50" stroke="#c89468" stroke-width="0.7" fill="none" opacity="0.5"/>
</svg>
