<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Kadın Mühendis 2 - İndigo arka plan, turuncu baret, kahverengi saç -->
  <circle cx="50" cy="50" r="50" fill="#4338ca"/>
  <!-- Uzun saç (arkada) -->
  <ellipse cx="34" cy="57" rx="8" ry="19" fill="#8b5e3c"/>
  <ellipse cx="66" cy="57" rx="8" ry="19" fill="#8b5e3c"/>
  <!-- Gövde -->
  <ellipse cx="50" cy="94" rx="33" ry="24" fill="#312e81"/>
  <!-- Yaka -->
  <polygon points="50,63 44,75 56,75" fill="#c7d2fe"/>
  <!-- Boyun -->
  <rect x="46" y="55" width="8" height="12" rx="2" fill="#fcd9b0"/>
  <!-- Yüz -->
  <circle cx="50" cy="41" r="16" fill="#fcd9b0"/>
  <!-- Saç üst -->
  <path d="M34,41 C34,24 66,24 66,41 C63,32 56,26 50,26 C44,26 37,32 34,41Z" fill="#8b5e3c"/>
  <!-- Turuncu baret gövdesi -->
  <ellipse cx="50" cy="30" rx="19" ry="11" fill="#f97316"/>
  <!-- Baret saçağı -->
  <ellipse cx="50" cy="36" rx="23" ry="5" fill="#ea580c"/>
  <!-- Baret parlaklık -->
  <ellipse cx="44" cy="25" rx="6" ry="3" fill="#fed7aa" opacity="0.5"/>
  <!-- Küpeler -->
  <circle cx="34.5" cy="44" r="2" fill="#a5b4fc"/>
  <circle cx="65.5" cy="44" r="2" fill="#a5b4fc"/>
  <!-- Gözler -->
  <circle cx="44" cy="40" r="2.2" fill="#1a0a00"/>
  <circle cx="56" cy="40" r="2.2" fill="#1a0a00"/>
  <circle cx="44.8" cy="39.3" r="0.7" fill="#fff"/>
  <circle cx="56.8" cy="39.3" r="0.7" fill="#fff"/>
  <!-- İnce kaşlar -->
  <path d="M41,36 Q44,34.5 47,36" stroke="#5c3317" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <path d="M53,36 Q56,34.5 59,36" stroke="#5c3317" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <!-- Ağız -->
  <path d="M45,49 Q50,54 55,49" stroke="#b07050" stroke-width="1.6" fill="none" stroke-linecap="round"/>
</svg>
