  <ellipse cx="50" cy="52" rx="11" ry="5.5" fill="#e8b888" opacity="0.5"/>

  <!-- Kulaklar -->
  <ellipse cx="34" cy="43" rx="3" ry="4.5" fill="#e8b888"/>
  <ellipse cx="34" cy="43" rx="1.8" ry="2.8" fill="#d4a574" opacity="0.4"/>
  <ellipse cx="66" cy="43" rx="3" ry="4.5" fill="#e8b888"/>
