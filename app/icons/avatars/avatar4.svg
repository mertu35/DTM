<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Kadın Yönetici - Koyu teal, blazer, topuz saç -->
  <circle cx="50" cy="50" r="50" fill="#0f766e"/>
  <!-- Blazer -->
  <ellipse cx="50" cy="96" rx="36" ry="26" fill="#064e46"/>
  <!-- Bluz -->
  <polygon points="50,63 45,80 55,80" fill="#ccfbf1"/>
  <!-- Sol yaka -->
  <polygon points="46,61 34,82 50,80" fill="#064e46"/>
  <!-- Sağ yaka -->
  <polygon points="54,61 66,82 50,80" fill="#0a6258"/>
  <!-- Boyun -->
  <rect x="46" y="55" width="8" height="10" rx="2" fill="#fcd9b0"/>
  <!-- Yüz -->
  <circle cx="50" cy="41" r="16" fill="#fcd9b0"/>
  <!-- Saç arkaya çekilmiş -->
  <path d="M34,41 C34,24 66,24 66,41 C63,32 56,26 50,26 C44,26 37,32 34,41Z" fill="#2d1b0e"/>
  <!-- Topuz -->
  <circle cx="50" cy="21" r="8" fill="#2d1b0e"/>
  <ellipse cx="50" cy="25" rx="8" ry="5" fill="#3d2b1f"/>
  <!-- Topuz tokası -->
  <ellipse cx="50" cy="21" rx="4" ry="2" fill="#4b3a2a" opacity="0.6"/>
  <!-- Küpeler -->
  <circle cx="34" cy="44" r="2.2" fill="#99f6e4"/>
  <circle cx="66" cy="44" r="2.2" fill="#99f6e4"/>
  <!-- Gözler -->
  <circle cx="44" cy="40" r="2.2" fill="#1a0a00"/>
  <circle cx="56" cy="40" r="2.2" fill="#1a0a00"/>
  <circle cx="44.8" cy="39.3" r="0.7" fill="#fff"/>
  <circle cx="56.8" cy="39.3" r="0.7" fill="#fff"/>
  <!-- İnce kaşlar -->
  <path d="M41,36 Q44,34.5 47,36" stroke="#2d1b0e" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <path d="M53,36 Q56,34.5 59,36" stroke="#2d1b0e" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <!-- Ağız -->
  <path d="M45,49 Q50,53 55,49" stroke="#b07050" stroke-width="1.6" fill="none" stroke-linecap="round"/>
</svg>
