<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Arka plan -->
  <circle cx="50" cy="50" r="50" fill="#059669"/>

  <!-- Uzun saç (arkada, omuzlara inen) -->
