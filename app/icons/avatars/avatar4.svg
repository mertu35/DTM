  <path d="M54,37 Q58,35.5 61,37.5" stroke="#3d2010" stroke-width="1.3" fill="none" stroke-linecap="round"/>

  <!-- Gözler -->
  <ellipse cx="43" cy="41" rx="3" ry="3.2" fill="#fff"/>
  <ellipse cx="57" cy="41" rx="3" ry="3.2" fill="#fff"/>
  <!-- Kirpikler -->
  <path d="M40,38.5 Q41,37.5 42,38" stroke="#3d2010" stroke-width="0.8" fill="none"/>
  <path d="M44,38 Q45,37 46,38" stroke="#3d2010" stroke-width="0.8" fill="none"/>
  <path d="M54,38 Q55,37 56,38" stroke="#3d2010" stroke-width="0.8" fill="none"/>
  <path d="M58,38 Q59,37.5 60,38.5" stroke="#3d2010" stroke-width="0.8" fill="none"/>
  <!-- İris -->
  <circle cx="43.5" cy="41.2" r="2" fill="#3d2010"/>
  <circle cx="57.5" cy="41.2" r="2" fill="#3d2010"/>
  <!-- Göz bebeği -->
  <circle cx="43.5" cy="41.2" r="1" fill="#1a0a05"/>
  <circle cx="57.5" cy="41.2" r="1" fill="#1a0a05"/>
  <!-- Göz parlaması -->
  <circle cx="44.3" cy="40.3" r="0.7" fill="#fff"/>
  <circle cx="58.3" cy="40.3" r="0.7" fill="#fff"/>

  <!-- Burun -->
  <path d="M48,44 Q50,48 52,44" stroke="#c89468" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Ağız -->
  <path d="M43.5,50.5 Q50,55 56.5,50.5" stroke="#b06050" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <path d="M44.5,51 Q50,54.5 55.5,51" fill="#c47a60" opacity="0.3"/>
  <path d="M45,50.5 Q50,49 55,50.5" stroke="#b06850" stroke-width="0.7" fill="none"/>
