  <ellipse cx="65" cy="62" rx="10" ry="22" fill="#5c3317"/>

  <!-- Gövde / bluz -->
  <ellipse cx="50" cy="98" rx="38" ry="28" fill="#d1fae5"/>
  <!-- Bluz V yaka -->
  <path d="M43,64 L50,74 L57,64" stroke="#a7f3d0" stroke-width="1.5" fill="none"/>

  <!-- Boyun -->
  <path d="M44,57 L44,64 Q50,67 56,64 L56,57" fill="#e8b888"/>

  <!-- Yüz -->
  <ellipse cx="50" cy="42" rx="16" ry="18.5" fill="#f0c8a0"/>
