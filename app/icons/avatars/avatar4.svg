  <!-- Saç kakül -->
  <path d="M38,35 Q42,29 47,32 Q44,27 50,26 Q47,29 49,33" fill="#6b3a1a" opacity="0.5"/>
  <!-- Saç yan -->
  <path d="M34,38 C33,44 33,52 35,60" stroke="#5c3317" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <path d="M66,38 C67,44 67,52 65,60" stroke="#5c3317" stroke-width="4.5" fill="none" stroke-linecap="round"/>

  <!-- Kaşlar (ince, kadın) -->
